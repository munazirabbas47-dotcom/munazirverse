{% extends 'base.html' %}

{% block title %} Contact -Us{% endblock %}

{% block body %} 

<div class="container my-3">
    <h3>Contact Mcoder Admain</h3>
    <form action="/contact" method="post">{% csrf_token %}
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" class="form-control" minlength="3" id="name" name="name" placeholder="Enter Your Name" required="true">
        </div>
        <div class="form-group">
            <label for="name">Email</label>
            <input type="email" class="form-control" minlength="4" id="email" name="email" placeholder="Enter Your Email"
                required="true">
        </div>
        <div class="form-group">
            <label for="name">Phone</label>
            <input type="tel" class="form-control"  id="phone" maxlength="13" pattern="[0-9]{11,13}" name="phone" placeholder="Enter Your Phone Number"
                required="true">
        </div>
        <div class="form-group">
            <div class="form-group">
                <label for="desc">How May We Help You ?</label>
                <textarea class="form-control" id="desc" minlength="4" name="desc" rows="3" required="true"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Submit</button>
    </form>
</div>
{% endblock %}

{% block js%}

<script>
    {% if thanks %}
    alert('Thanks For Contacting us We Will Get You Soon!')
    document.location = "/contact";

    {% endif %}

</script>

{% endblock %}
